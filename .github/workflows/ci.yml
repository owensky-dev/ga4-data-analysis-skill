name: CI

on:
  pull_request:
    paths:
      - ".github/workflows/ci.yml"
      - "scripts/**"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/ci.yml"
      - "scripts/**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Node and Python tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: scripts/tests/requirements.txt

      - name: Install test dependencies
        run: python -m pip install -r scripts/tests/requirements.txt

      - name: Validate Node fetcher
        run: |
          node --check scripts/fetch_ga4_weekly.js
          node --test scripts/tests/test_fetch_ga4_weekly.js

      - name: Validate Python report builder
        run: |
          python -m compileall -q scripts
          python -m unittest discover -s scripts/tests -p 'test_*.py'
